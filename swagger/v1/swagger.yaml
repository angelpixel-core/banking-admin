---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/banking_admin/api/v1/accounts":
    post:
      summary: Create account
      tags:
      - Accounts
      parameters:
      - name: X-Correlation-ID
        in: header
        schema:
          type: string
      responses:
        '201':
          description: account created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/account_create_response"
        '422':
          description: invalid account state
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_envelope"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/account_create_request"
  "/banking_admin/api/v1/ledger_entries":
    post:
      summary: Post ledger entries
      tags:
      - Ledger
      parameters:
      - name: X-Correlation-ID
        in: header
        schema:
          type: string
      responses:
        '201':
          description: ledger transaction created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ledger_entries_create_response"
        '409':
          description: duplicate reference
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_envelope"
        '422':
          description: unbalanced transaction
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_envelope"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ledger_entries_create_request"
  "/banking_admin/api/v1/balances":
    get:
      summary: List balances
      tags:
      - Balances
      parameters:
      - name: X-Correlation-ID
        in: header
        schema:
          type: string
      - name: account_id
        in: query
        schema:
          type: string
          format: uuid
      - name: asset_code
        in: query
        schema:
          type: string
      responses:
        '200':
          description: balances returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/balances_index_response"
components:
  schemas:
    account_create_request:
      type: object
      required:
      - account
      properties:
        account:
          type: object
          required:
          - account_type
          - base_currency
          properties:
            id:
              type: string
              format: uuid
            account_type:
              type: string
              enum:
              - user
              - treasury
              - system
            base_currency:
              type: string
            status:
              type: string
              enum:
              - pending
              - active
              - suspended
      example:
        account:
          id: 11111111-aaaa-bbbb-cccc-000000000001
          account_type: user
          base_currency: USD
          status: active
    account_create_response:
      type: object
      required:
      - id
      - account_type
      - base_currency
      - status
      - correlation_id
      properties:
        id:
          type: string
          format: uuid
        account_type:
          type: string
        base_currency:
          type: string
        status:
          type: string
        correlation_id:
          type: string
      example:
        id: 11111111-aaaa-bbbb-cccc-000000000001
        account_type: user
        base_currency: USD
        status: active
        correlation_id: test-corr-accounts-1
    balance:
      type: object
      required:
      - account_id
      - asset_code
      - available_amount
      - locked_amount
      - borrowed_amount
      properties:
        account_id:
          type: string
          format: uuid
        asset_code:
          type: string
        available_amount:
          type: string
        locked_amount:
          type: string
        borrowed_amount:
          type: string
      example:
        account_id: 11111111-1111-1111-1111-111111111111
        asset_code: USD
        available_amount: '100.0'
        locked_amount: '0.0'
        borrowed_amount: '0.0'
    balances_index_response:
      type: object
      required:
      - balances
      - correlation_id
      properties:
        balances:
          type: array
          items:
            "$ref": "#/components/schemas/balance"
        correlation_id:
          type: string
      example:
        balances:
        - account_id: 11111111-1111-1111-1111-111111111111
          asset_code: USD
          available_amount: '100.0'
          locked_amount: '0.0'
          borrowed_amount: '0.0'
        correlation_id: test-corr-balances-1
    error_envelope:
      type: object
      required:
      - code
      - message
      - correlation_id
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        details:
          nullable: true
      example:
        code: duplicate_reference
        message: reference already posted
        correlation_id: test-corr-ledger-3
    ledger_entries_create_request:
      type: object
      required:
      - ledger_entry
      properties:
        ledger_entry:
          type: object
          required:
          - reference_type
          - reference_id
          - entries
          properties:
            reference_type:
              type: string
            reference_id:
              type: string
            entries:
              type: array
              items:
                type: object
                required:
                - id
                - account_id
                - side
                - asset_code
                - amount
                properties:
                  id:
                    type: string
                    format: uuid
                  account_id:
                    type: string
                    format: uuid
                  side:
                    type: string
                    enum:
                    - debit
                    - credit
                  asset_code:
                    type: string
                  amount:
                    type: string
      example:
        ledger_entry:
          reference_type: transfer
          reference_id: fixture-ref-0001
          entries:
          - id: 33333333-3333-3333-3333-333333333331
            account_id: 11111111-1111-1111-1111-111111111111
            side: debit
            asset_code: USD
            amount: '100.00'
          - id: 33333333-3333-3333-3333-333333333332
            account_id: 22222222-2222-2222-2222-222222222222
            side: credit
            asset_code: USD
            amount: '100.00'
    ledger_entries_create_response:
      type: object
      required:
      - reference_type
      - reference_id
      - entry_count
      - correlation_id
      properties:
        reference_type:
          type: string
        reference_id:
          type: string
        entry_count:
          type: integer
        correlation_id:
          type: string
      example:
        reference_type: transfer
        reference_id: fixture-ref-0001
        entry_count: 2
        correlation_id: test-corr-ledger-1
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
